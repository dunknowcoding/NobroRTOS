<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NobroRTOS Block Editor</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="panel editor" aria-label="Block editor">
        <header class="topbar">
          <div class="logo" aria-hidden="true">
            <svg viewBox="0 0 64 64">
              <path d="M8 12h48v40H8z" fill="#12191d"/>
              <path d="M16 20h14v10H16zM34 20h14v10H34zM16 34h32v10H16z" fill="#24d6a3"/>
              <path d="m23 49 9-9 9 9" fill="none" stroke="#ffbf47" stroke-width="5"/>
            </svg>
          </div>
          <div>
            <h1>NobroRTOS Block Editor</h1>
            <p>Visual app builder for the `app.json` contract.</p>
          </div>
        </header>

        <div class="project-row">
          <label>
            <span>Project</span>
            <input id="projectName" value="hello_device" maxlength="32">
          </label>
          <label>
            <span>Board</span>
            <select id="boardSelect">
              <option value="nrf52840-nosd">nRF52840 (no SoftDevice)</option>
              <option value="nrf52840-s140">nRF52840 (S140)</option>
            </select>
          </label>
        </div>

        <div class="layout">
          <section class="palette" aria-label="Block palette">
            <h2>Blocks</h2>
            <button data-role="periodic" type="button">Periodic task</button>
            <button data-role="control" type="button">Control task</button>
            <button data-role="service" type="button">Service task</button>
            <button id="addWire" type="button">Wire tasks</button>
          </section>

          <section class="stage" aria-label="App blocks">
            <h2>App</h2>
            <ul id="blockList" class="block-list"></ul>
          </section>
        </div>
      </section>

      <aside class="panel output" aria-label="Generated app JSON">
        <div class="output-head">
          <h2>app.json</h2>
          <div>
            <button id="copyBtn" type="button">Copy</button>
            <button id="downloadBtn" type="button">Download</button>
          </div>
        </div>
        <pre id="jsonOut"></pre>
        <div id="status" class="status" aria-live="polite"></div>
      </aside>
    </main>
    <script src="app.js"></script>
  </body>
</html>
