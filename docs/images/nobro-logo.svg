<svg width="840" height="220" viewBox="0 0 840 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NobroRTOS - the AI, Robot and IoT nexus RTOS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#131a2e"/>
    </linearGradient>
    <linearGradient id="nexus" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="836" height="216" rx="26" fill="url(#bg)" stroke="#1f2a44" stroke-width="2"/>

  <!-- nexus chip icon -->
  <g transform="translate(58,46)" fill="none" stroke="url(#nexus)" stroke-width="3.5" stroke-linecap="round">
    <!-- chip body -->
    <rect x="14" y="14" width="100" height="100" rx="18"/>
    <!-- pins -->
    <g stroke-width="6">
      <line x1="40" y1="6"  x2="40" y2="14"/>  <line x1="64" y1="6"  x2="64" y2="14"/>  <line x1="88" y1="6"  x2="88" y2="14"/>
      <line x1="40" y1="114" x2="40" y2="122"/> <line x1="64" y1="114" x2="64" y2="122"/> <line x1="88" y1="114" x2="88" y2="122"/>
      <line x1="6"  y1="40" x2="14" y2="40"/>  <line x1="6"  y1="64" x2="14" y2="64"/>  <line x1="6"  y1="88" x2="14" y2="88"/>
      <line x1="114" y1="40" x2="122" y2="40"/> <line x1="114" y1="64" x2="122" y2="64"/> <line x1="114" y1="88" x2="122" y2="88"/>
    </g>
    <!-- nexus links -->
    <g stroke-width="2.6" opacity="0.85">
      <line x1="64" y1="64" x2="44" y2="40"/>
      <line x1="64" y1="64" x2="86" y2="44"/>
      <line x1="64" y1="64" x2="64" y2="92"/>
    </g>
    <!-- central hub + three nodes (AI / Robot / IoT) -->
    <circle cx="64" cy="64" r="7.5" fill="#0b1020" filter="url(#glow)"/>
    <circle cx="44" cy="40" r="6" fill="#38bdf8" stroke="none" filter="url(#glow)"/>
    <circle cx="86" cy="44" r="6" fill="#2dd4bf" stroke="none" filter="url(#glow)"/>
    <circle cx="64" cy="92" r="6" fill="#f59e0b" stroke="none" filter="url(#glow)"/>
  </g>

  <!-- wordmark -->
  <text x="210" y="104" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="62" font-weight="800" fill="#f8fafc" letter-spacing="-1">Nobro<tspan fill="url(#nexus)">RTOS</tspan></text>
  <text x="212" y="140" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#9fb3d1">The AI &#183; Robot &#183; IoT nexus RTOS</text>
  <text x="212" y="170" font-family="Consolas, monospace" font-size="15" fill="#5b6b8c">no_std &#183; static capacity &#183; deadline-aware &#183; host-readable</text>
</svg>
