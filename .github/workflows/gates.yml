# Hosted mirror of the portable source and package checks.
name: gates
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  python-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: user release boundary
        run: python tools/check_release_boundary.py
      - name: python binding tests
        working-directory: bindings/python
        run: python -m unittest discover -s tests
      - name: software surface contract
        run: python tools/nobro_contract_tool.py check-software-surface
      - name: public documentation
        run: python tools/check_public_docs.py
      - name: board profiles
        run: python tools/check_board_profiles.py
      - name: scalable core layout
        run: python tools/check_core_layout.py
      - name: adapter catalog
        run: python tools/check_adapter_catalog.py
      - name: one-file firmware project
        run: python tools/nobro_firmware_project.py --selftest
      - name: sdk manifest
        run: python tools/check_sdk_manifest.py
      - name: arduino package drift
        run: |
          python tools/package_arduino.py --check
          python tools/check_distribution_artifacts.py
          python tools/check_arduino_facade.py
      - name: web flasher + block editor + tutorials
        run: |
          python tools/check_web_flasher.py
          python tools/check_block_editor.py
          python tools/tutorial_runner.py
      - name: codegen + public contract selftests
        run: |
          python tools/ros_msg_gen.py --selftest
          python tools/import_dts.py --selftest
          python tools/check_release_versions.py
          python tools/check_ros_bridge.py --selftest
          python tools/check_udi.py --selftest
          python tools/nobro_shrink.py --selftest
          python tools/check_platform_tiers.py --selftest
      - name: complete product experience gates
        run: |
          python tools/nobro_app.py tutorials/hello-device/app.json
          python tools/package_prebuilt_uf2.py --check
          python tools/nobro_admission.py --selftest
          python sdk/cli/nobro.py project --selftest
  rust-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: thumbv7em-none-eabihf
          components: clippy,rustfmt,llvm-tools-preview,rust-src
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build generated firmware and prebuilt UF2 experiences
        run: |
          python tools/nobro_firmware_project.py tutorials/rover-one-file/app.nobro --out _work/ci-firmware --build
          python tutorials/rover-python/app.py _work/python-authoring/app.json
          python tools/nobro_firmware_project.py _work/python-authoring/app.json --out _work/python-firmware --build
          python tools/package_prebuilt_uf2.py --build
      - name: comprehensive Rust gates
        run: |
          python tools/check_platform_tiers.py --begin-receipts rust-matrix
          python tools/run_checks.py --rust-only
          python tools/check_platform_tiers.py --run-gate nrf52840-hal-host
          python tools/check_platform_tiers.py --run-gate nrf52840-usb-host
          python tools/check_platform_tiers.py --assert-receipts rust-matrix

  supply-chain-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rust-src
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-llvm-cov
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: locked source and license policy
        run: python tools/check_dependency_policy.py
      - name: advisory database audit
        working-directory: core
        # cargo-audit reads a lockfile directly and has no --locked option.
        run: cargo audit --file Cargo.lock
      - name: portable coverage
        working-directory: core
        run: >-
          cargo llvm-cov --locked -p nobro-kernel -p nobro-net -p nobro-secure
          -p nobro-admission -p nobro-storage -p nobro-database -p nobro-power -p nobro-sal
          --target x86_64-unknown-linux-gnu --lcov --output-path ../coverage.lcov
      - uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: coverage.lcov

  miri-sanitizer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri,rust-src
      - name: Miri portable safety boundary
        working-directory: core
        run: >-
          cargo miri test --locked --target x86_64-unknown-linux-gnu
          -p nobro-database -p nobro-storage -p nobro-net -p nobro-secure -p nobro-hal
      - name: Miri bounded async and executor-cell boundary
        working-directory: core
        env:
          # AsyncCore is embedded with static-cell lifetime; tests model that with Box::leak.
          MIRIFLAGS: -Zmiri-ignore-leaks
        # `cargo test` takes a single positional filter, so each bounded async
        # or one-shot initialization surface is checked separately.
        run: |
          cargo miri test --locked --target x86_64-unknown-linux-gnu -p nobro-kernel async_rt::tests
          cargo miri test --locked --target x86_64-unknown-linux-gnu -p nobro-kernel async_mpmc::tests
          cargo miri test --locked --target x86_64-unknown-linux-gnu -p nobro-kernel health::tests::in_place_initialization_matches_const_constructor
          cargo miri test --locked --target x86_64-unknown-linux-gnu -p nobro-kernel graph::tests::reactor_domain_linkage
          cargo miri test --locked --target x86_64-unknown-linux-gnu -p nobro-kernel graph::tests::graph_spec_starts_and_seals_executor_without_retained_built_graph
          cargo miri test --locked --target x86_64-unknown-linux-gnu -p nobro-kernel graph::tests::graph_validation_failure_does_not_claim_the_executor_cell
          cargo miri test --locked --target x86_64-unknown-linux-gnu -p nobro-kernel graph::tests::graph_executor_init_failure_restores_the_cell_for_retry
          cargo miri test --locked --target x86_64-unknown-linux-gnu -p nobro-kernel kernel_executor::tests::executor_graph_workspace_keeps_scratch_disjoint_from_admission
          cargo miri test --locked --target x86_64-unknown-linux-gnu -p nobro-hal --no-default-features --features platform-nrf52840,board-promicro-nosd,nrf-twim-async twim_hw::async_provider::tests
          cargo miri test --locked --target x86_64-unknown-linux-gnu --manifest-path ports/ra4m1/Cargo.toml --lib event_dma::tests
      - name: address sanitizer smoke
        working-directory: core
        env:
          CARGO_TARGET_DIR: ../_work/ci-asan
          RUSTFLAGS: -Zsanitizer=address
        run: >-
          cargo test --locked --target x86_64-unknown-linux-gnu
          -p nobro-database -p nobro-storage -p nobro-net -p nobro-secure

  cross-mcu:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: thumbv6m-none-eabi,thumbv7m-none-eabi,thumbv7em-none-eabihf,thumbv8m.main-none-eabihf,riscv32imc-unknown-none-elf,riscv32imac-unknown-none-elf
          components: rust-src,llvm-tools-preview
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install ESP32-S3 Xtensa Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          espup_zip=/tmp/espup-x86_64-unknown-linux-gnu.zip
          curl --fail --location --retry 6 --retry-all-errors --retry-delay 10 \
            --output "$espup_zip" \
            https://github.com/esp-rs/espup/releases/download/v0.17.1/espup-x86_64-unknown-linux-gnu.zip
          unzip -o "$espup_zip" -d "$HOME/.cargo/bin"
          chmod +x "$HOME/.cargo/bin/espup"
          "$HOME/.cargo/bin/espup" install -l debug --targets esp32s3 \
            --toolchain-version 1.95.0.0
          source "$HOME/export-esp.sh"
          echo "$PATH" >> "$GITHUB_PATH"
          echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> "$GITHUB_ENV"
      - name: install Tier-C Arm linker
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-arm-none-eabi
      - name: full reproducible cross-MCU matrix
        run: bash tools/ci_matrix.sh

  arduino-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install pinned Arduino CLI
        shell: bash
        run: |
          set -euo pipefail
          archive=/tmp/arduino-cli_1.5.1_Linux_64bit.tar.gz
          curl --fail --location --retry 6 --retry-all-errors --retry-delay 10 \
            --output "$archive" \
            https://github.com/arduino/arduino-cli/releases/download/v1.5.1/arduino-cli_1.5.1_Linux_64bit.tar.gz
          mkdir -p "$HOME/.local/bin"
          tar -xzf "$archive" -C "$HOME/.local/bin" arduino-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/arduino-cli" version | grep -F "Version: 1.5.1"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install representative cores
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr
          arduino-cli core install arduino:renesas_uno
          arduino-cli core install esp32:esp32 --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
      - name: compile public package examples (AVR, UNO R4, ESP32-S3)
        env:
          NOBRO_ARDUINO_FQBNS: arduino:avr:uno,arduino:renesas_uno:unor4wifi,esp32:esp32:esp32s3
        run: |
          python tools/check_platform_tiers.py --begin-receipts arduino-package
          python tools/check_platform_tiers.py --run-gate arduino-facade-contract
          python tools/check_platform_tiers.py --run-gate arduino-ra4m1-compile
          python tools/check_platform_tiers.py --assert-receipts arduino-package
      - name: pinned NiusIMU integration
        run: |
          git clone https://github.com/dunknowcoding/ArduinoNRF-IMU.git _work/ArduinoNRF-IMU
          git -C _work/ArduinoNRF-IMU checkout 7c8248b8d37294be6cc545c3cf549e907ccbc955
          python tools/check_niusimu_adapter.py --library _work/ArduinoNRF-IMU --inventory-only
          python tools/check_niusimu_adapter.py --selftest
      - name: pinned wireless integrations
        run: |
          git clone https://github.com/dunknowcoding/NiusWireless.git _work/NiusWireless
          git -C _work/NiusWireless checkout f40e76cccbcb0b5d0597f784ae5be1e6a52d46cb
          git clone https://github.com/dunknowcoding/ArduinoNRF-Zigbee.git _work/ArduinoNRF-Zigbee
          git -C _work/ArduinoNRF-Zigbee checkout 4d4fb8f1afa7a4406d2a0bf399f6249681bc62b9
          python tools/check_wireless_integrations.py \
            --niuswireless _work/NiusWireless \
            --niuszigbee _work/ArduinoNRF-Zigbee --compile
      - name: pinned camera integration
        run: |
          git clone https://github.com/dunknowcoding/NiusCam.git _work/NiusCam
          git -C _work/NiusCam checkout b03560adf4da07e4a16b4d9e658a01d74ccb9340
          python tools/check_camera_integrations.py --library _work/NiusCam --compile

  arduino-nrf-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: install pinned Arduino CLI
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "arduino-cli_1.5.1_Windows_64bit.zip"
          $toolDir = Join-Path $env:RUNNER_TEMP "arduino-cli-1.5.1"
          curl.exe --fail --location --retry 6 --retry-all-errors --retry-delay 10 `
            --output $archive `
            https://github.com/arduino/arduino-cli/releases/download/v1.5.1/arduino-cli_1.5.1_Windows_64bit.zip
          if ($LASTEXITCODE -ne 0) { throw "Arduino CLI download failed" }
          Expand-Archive -LiteralPath $archive -DestinationPath $toolDir -Force
          $binary = Join-Path $toolDir "arduino-cli.exe"
          $version = & $binary version
          if ($version -notmatch "Version: 1\.5\.1") { throw "unexpected Arduino CLI: $version" }
          $toolDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install pinned ArduinoNRF core
        shell: pwsh
        run: |
          $index = "https://raw.githubusercontent.com/dunknowcoding/ArduinoNRF/0add1ce4842b346316334d41f1038e792f3b6958/package_arduinonrf_index.json"
          arduino-cli core update-index --additional-urls $index
          arduino-cli core install arduinonrf:nrf52@0.3.11 --additional-urls $index
      - name: compile public package examples (ArduinoNRF)
        shell: pwsh
        run: |
          python tools/check_platform_tiers.py --begin-receipts arduino-nrf-package
          python tools/check_platform_tiers.py --run-gate arduino-nrf52840-compile
          python tools/check_platform_tiers.py --assert-receipts arduino-nrf-package
      - name: compile pinned NiusIMU integration (ArduinoNRF)
        shell: pwsh
        run: |
          git clone https://github.com/dunknowcoding/ArduinoNRF-IMU.git _work/ArduinoNRF-IMU
          git -C _work/ArduinoNRF-IMU checkout 7c8248b8d37294be6cc545c3cf549e907ccbc955
          python tools/check_niusimu_adapter.py --library _work/ArduinoNRF-IMU --fqbn "arduinonrf:nrf52:promicro_nrf52840:usbcdc=enabled"
      - name: compile pinned NiusZigbee integration (ArduinoNRF)
        shell: pwsh
        run: |
          git clone https://github.com/dunknowcoding/NiusWireless.git _work/NiusWireless
          git -C _work/NiusWireless checkout f40e76cccbcb0b5d0597f784ae5be1e6a52d46cb
          git clone https://github.com/dunknowcoding/ArduinoNRF-Zigbee.git _work/ArduinoNRF-Zigbee
          git -C _work/ArduinoNRF-Zigbee checkout 4d4fb8f1afa7a4406d2a0bf399f6249681bc62b9
          python tools/check_wireless_integrations.py --niuswireless _work/NiusWireless --niuszigbee _work/ArduinoNRF-Zigbee --compile-zigbee
