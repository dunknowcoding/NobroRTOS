[package]
name = "stack-guard-demo"
version.workspace = true
edition.workspace = true

# Stack-overflow detection on a development board (M168): plant a canary region below
# the live stack pointer, verify it survives shallow recursion (no false positive), then
# verify deep recursion trips it (true positive). NOBRO_STACK_REPORT (mem32).
[[bin]]
name = "stack_guard_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[[bin]]
name = "stack_guard_demo_s140"
path = "src/main.rs"
required-features = ["board-nicenano-s140"]

[dependencies]
nobro-hal = { path = "../../crates/nobro_hal", default-features = false }
nobro-kernel = { path = "../../crates/nobro_kernel" }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140"]
