[package]
name = "mvk-ppi-timestamp"
version.workspace = true
edition.workspace = true

[[bin]]
name = "mvk_ppi_timestamp"
path = "src/main.rs"

[dependencies]
airon-hal = { path = "../../crates/nobro_hal", default-features = false }
airon-kernel = { path = "../../crates/nobro_kernel" }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-probe = { version = "0.3", features = ["print-defmt"] }
nrf52840-pac = "0.12"
critical-section = "1.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["airon-hal/board-promicro-nosd"]
board-nicenano-s140 = ["airon-hal/board-nicenano-s140"]
