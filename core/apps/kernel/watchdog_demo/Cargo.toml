[package]
name = "watchdog-demo"
version.workspace = true
edition.workspace = true

# Watchdog recovery on real hardware (M70): arm the nRF WDT, let it reset the chip, then
# detect the watchdog reset cause on reboot and self-certify recovery.
[[bin]]
name = "watchdog_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140"]
