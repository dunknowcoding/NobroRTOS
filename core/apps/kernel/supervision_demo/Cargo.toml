[package]
name = "supervision-demo"
version.workspace = true
edition.workspace = true

# Liveness task supervision on real time (M166): two supervised tasks on the live
# microsecond clock - one keeps checking in (stays Healthy), one goes silent and
# escalates Restart -> Degrade -> Reboot, then recovers. NOBRO_SUPERVISION_REPORT.
[[bin]]
name = "supervision_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
nobro-kernel = { path = "../../../crates/nobro_kernel" }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140"]
