[package]
name = "rtc-sleep-demo"
version.workspace = true
edition.workspace = true

# Low-power idle + RTC wake on a development board (M158): start the LFCLK, program RTC2
# compare ticks, take the Resource::Rtc2 lease, pick the power mode via the nobro-power
# policy, and WFE-idle between wakes. Verifies the wake count and the measured average
# wake interval against the programmed RTC period. NOBRO_RTC_SLEEP_REPORT (mem32).
[[bin]]
name = "rtc_sleep_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
nobro-power = { path = "../../../crates/nobro_power" }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140"]
