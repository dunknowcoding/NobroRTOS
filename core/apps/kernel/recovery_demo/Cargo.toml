[package]
name = "recovery-demo"
version.workspace = true
edition.workspace = true

# Recovery pillar on hardware: drives the kernel RecoveryCoordinator through a fault
# scenario (watchdog expiry + repeated module errors) and records the escalation
# (action + system state) in NOBRO_RECOVERY_REPORT. Pure kernel logic - no HAL, no
# sensors - so it proves the bounded fault-handling state machine runs on the MCU.
[[bin]]
name = "recovery_demo"
path = "src/main.rs"

[dependencies]
nobro-kernel = { path = "../../../crates/nobro_kernel" }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"
