[package]
name = "udi-imu-demo"
version.workspace = true
edition.workspace = true

# Universal Driver Interface proof: the SAME app drives the SAME physical IMU through
# two different backends selected only by cargo feature - the native HAL SPI driver or
# an embedded-hal SpiDevice driver - behind the one ImuSal category trait. Both builds
# must seal the same PASS in NOBRO_UDI_IMU_REPORT on real hardware; the report carries
# which backend produced it. This is the sensor-side twin of nobro_usb's backend mounts.
[[bin]]
name = "udi_imu_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-hal = { path = "../../crates/nobro_hal", default-features = false }
nobro-sal = { path = "../../crates/nobro_sal", default-features = false }
nobro-eh-spi = { path = "../../adapters/embedded-hal-spi", default-features = false, optional = true }
embedded-hal = { version = "1.0", optional = true }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[build-dependencies]
cc = { version = "1.0", optional = true }

[features]
default = ["board-promicro-nosd", "backend-native"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd", "nobro-eh-spi?/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140", "nobro-eh-spi?/board-nicenano-s140"]
# Exactly one IMU backend; the app never names the transport.
backend-native = []
backend-eh = ["dep:nobro-eh-spi", "dep:embedded-hal"]
# an Arduino-style C++ driver (bindings/cpp/arduino_shim) compiled by arm-none-eabi-g++
backend-arduino = ["dep:cc"]
