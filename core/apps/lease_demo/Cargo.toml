[package]
name = "lease-demo"
version.workspace = true
edition.workspace = true

# More managed resources (M63): verify the kernel arbitrates PWM/EGU/PPI leases.
[[bin]]
name = "lease_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[[bin]]
name = "lease_demo_s140"
path = "src/main.rs"
required-features = ["board-nicenano-s140"]

[dependencies]
nobro-hal = { path = "../../crates/nobro_hal", default-features = false }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140"]
