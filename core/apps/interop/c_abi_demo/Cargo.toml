[package]
name = "nobro-c-abi-demo"
version.workspace = true
edition.workspace = true

# Demonstrates the NobroRTOS C ABI: the app provides extern "C" host services + an
# admitted module slot, and the kernel drives a module's extern "C" nobro_app_init /
# nobro_app_poll. The module logic lives outside this crate, behind the C ABI:
#   - default feature "rust-module": linked from nobro-c-abi-module (extern "C",
#     byte-identical ABI to C) - builds + runs without a C cross-compiler.
#   - feature "c-source": build.rs compiles bindings/c/examples/imu_module.c with cc
#     (needs arm-none-eabi-gcc). Same ABI; choose one module provider, not both.
[[bin]]
name = "c_abi_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-tierc = { path = "../../../crates/nobro_tierc", default-features = false }
nobro-c-abi-module = { path = "../c_abi_module", optional = true }

[build-dependencies]
cc = { version = "1.0", optional = true }

[features]
default = ["board-promicro-nosd", "rust-module"]
rust-module = ["dep:nobro-c-abi-module"]
c-source = ["dep:cc"]
cpp-source = ["dep:cc"]
board-promicro-nosd = ["nobro-tierc/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-tierc/board-nicenano-s140"]
