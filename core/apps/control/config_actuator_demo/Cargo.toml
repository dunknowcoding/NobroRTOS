[package]
name = "config-actuator-demo"
version.workspace = true
edition.workspace = true

# Config-driven actuator bring-up: drive a catalog servo brand via nobro-device's
# angle_to_pulse over the leased PwmBank, verified on a development board.
[[bin]]
name = "config_actuator_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
nobro-device = { path = "../../../crates/nobro_device" }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140"]
