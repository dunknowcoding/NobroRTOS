[package]
name = "kv-store-demo"
version.workspace = true
edition.workspace = true

# Wear-leveled KV flash store on real hardware: nobro-storage's KvStore backed by
# the nRF NVMC over two 4 KB pages; 1200 puts force compactions, then latest-value and
# remount-persistence checks. NOBRO_KV_REPORT.
[[bin]]
name = "kv_store_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
nobro-storage = { path = "../../../crates/nobro_storage" }
cortex-m = "0.7"
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140"]
