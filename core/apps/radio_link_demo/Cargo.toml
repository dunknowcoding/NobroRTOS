[package]
name = "radio-link-demo"
version.workspace = true
edition.workspace = true

# Board-to-board 2.4 GHz link over the nRF RADIO (no SoftDevice, no CC2530), for
# multi-board data collection. Two binaries: radio_tx streams a sequence counter; a
# peer running radio_rx receives + counts it. Each seals a NOBRO_RADIO_REPORT
# (J-Link mem32). board1 alone verifies the TX state machine; a second board running
# radio_rx verifies over-the-air delivery.
[[bin]]
name = "radio_tx"
path = "src/tx.rs"
required-features = ["board-promicro-nosd"]

[[bin]]
name = "radio_rx"
path = "src/rx.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-hal = { path = "../../crates/nobro_hal", default-features = false }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
