[package]
name = "sal-adapter-demo"
version.workspace = true
edition.workspace = true

[[bin]]
name = "sal_adapter_demo"
path = "src/main.rs"

[dependencies]
nobro-adapter-robo-servo = { path = "../../adapters/robo-servo", default-features = false }
nobro-adapter-sensor-stub = { path = "../../adapters/sensor-stub", default-features = false }
nobro-hal = { path = "../../crates/nobro_hal", default-features = false }
nobro-kernel = { path = "../../crates/nobro_kernel", features = ["hal-profile"] }
nobro-sal = { path = "../../crates/nobro_sal" }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-probe = { version = "0.3", features = ["print-defmt"] }

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = [
    "nobro-hal/board-promicro-nosd",
    "nobro-adapter-robo-servo/board-promicro-nosd",
    "nobro-adapter-sensor-stub/board-promicro-nosd",
]
board-nicenano-s140 = [
    "nobro-hal/board-nicenano-s140",
    "nobro-adapter-robo-servo/board-nicenano-s140",
    "nobro-adapter-sensor-stub/board-nicenano-s140",
]
