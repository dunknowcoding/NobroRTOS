[package]
name = "motion3-demo"
version.workspace = true
edition.workspace = true

# 3-class motion NN (idle/walk/shake) on a development board: run the trained int8
# classifier on synthetic per-class windows and verify each. NOBRO_NN3_REPORT (mem32).
[[bin]]
name = "motion3_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
nobro-adapter-nn-motion-ai = { path = "../../../adapters/ai/nn-motion-ai" }
nobro-sal = { path = "../../../crates/nobro_sal" }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140"]
