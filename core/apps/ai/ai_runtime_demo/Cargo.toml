[package]
name = "ai-runtime-demo"
version.workspace = true
edition.workspace = true

# AI runtime on a development board: a ModelRegistry multiplexes three models (on-device
# NN, hybrid LLM, edge-sidecar vision) and AiRoutePolicy picks where each runs across a
# scenario matrix - on real silicon. Then the trained NN's inference is timed
# for deadline compliance. Publishes NOBRO_AI_RUNTIME_REPORT.
[[bin]]
name = "ai_runtime_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
nobro-adapter-nn-motion-ai = { path = "../../../adapters/ai/nn-motion-ai" }
nobro-sal = { path = "../../../crates/nobro_sal" }
cortex-m = "0.7"
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140"]
