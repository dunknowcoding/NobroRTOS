[package]
name = "ai-usb-demo"
version.workspace = true
edition.workspace = true

# Edge AI you can watch: streams live motion classifications (idle/active +
# confidence) from the on-device MotionClassifier (AiInferenceSal) over USB serial.
# Any board with native USB self-reports its inference on a COM port - no J-Link.
[[bin]]
name = "ai_usb_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-adapter-motion-ai = { path = "../../../adapters/ai/motion-ai" }
nobro-adapter-mpu9250-imu = { path = "../../../adapters/imu/mpu9250-imu", default-features = false }
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
nobro-kernel = { path = "../../../crates/nobro_kernel" }
nobro-sal = { path = "../../../crates/nobro_sal" }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"
usb-device = "0.3"
usbd-serial = "0.2"
nrf-usbd = "0.3"
nrf52840-pac = "0.12"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = [
    "nobro-hal/board-promicro-nosd",
    "nobro-adapter-mpu9250-imu/board-promicro-nosd",
]
board-nicenano-s140 = [
    "nobro-hal/board-nicenano-s140",
    "nobro-adapter-mpu9250-imu/board-nicenano-s140",
]
