[package]
name = "radio-link-demo"
version.workspace = true
edition.workspace = true

# Board-to-board 2.4 GHz link over the nRF RADIO (no SoftDevice, no CC2530), for
# multi-board data collection. Two binaries: radio_tx streams a sequence counter; a
# peer running radio_rx receives + counts it. Each seals a NOBRO_RADIO_REPORT
# (J-Link mem32). A single transmitter verifies the TX state machine; a peer running
# radio_rx verifies over-the-air delivery.
[[bin]]
name = "radio_tx"
path = "src/tx.rs"
required-features = ["board-promicro-nosd"]

[[bin]]
name = "radio_rx"
path = "src/rx.rs"
required-features = ["board-promicro-nosd"]

# A data-collection source node: read the reference SPI MPU-9250 and broadcast its accel
# over the radio for a peer to collect.
[[bin]]
name = "radio_sensor_tx"
path = "src/sensor_tx.rs"
required-features = ["board-promicro-nosd"]

# Same radio TX, built for the S140 layout so a probe-less board can be the
# over-the-air transmitter.
[[bin]]
name = "radio_tx_s140"
path = "src/tx.rs"
required-features = ["board-nicenano-s140"]

[dependencies]
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
nobro-eh-spi = { path = "../../../adapters/bus/embedded-hal-spi", default-features = false }
embedded-hal = "1.0"
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd", "nobro-eh-spi/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140", "nobro-eh-spi/board-nicenano-s140"]
