[package]
name = "ble-adv-demo"
version.workspace = true
edition.workspace = true

# BLE peripheral telemetry with no SoftDevice: the nRF RADIO is driven raw in
# Ble1Mbit mode to broadcast standards-compliant ADV_NONCONN_IND frames on channels
# 37/38/39. Any phone or PC BLE scanner sees a "NOBRO" device whose manufacturer data
# carries live telemetry - no pairing, no connection, no stack.
[[bin]]
name = "ble_adv"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
nobro-wireless = { path = "../../../crates/nobro_wireless" }
cortex-m = "0.7"
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140"]
