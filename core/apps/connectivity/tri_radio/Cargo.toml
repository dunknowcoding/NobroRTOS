[package]
name = "tri-radio"
version.workspace = true
edition.workspace = true

# Raw 802.15.4 co-processor link: NobroRTOS drives the board's CC2530 over UART
# using the NiusZigbee SDCC transceiver firmware protocol (FE LEN CMD DATA FCS @115200).
# PING/PONG proves the link + reads the firmware version; promiscuous RX then counts
# real 802.15.4 frames off the air and reports them in NOBRO_CC2530_REPORT.
[[bin]]
name = "tri_radio"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
nobro-wireless = { path = "../../../crates/nobro_wireless" }
cortex-m = "0.7"
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140"]
