[package]
name = "usb-cdc-demo"
version.workspace = true
edition.workspace = true

# USB-CDC diagnostics: print the IMU health report over USB serial so boards without a
# debug probe can be verified by reading a COM port. Isolated app - the
# kernel and its no-heap principles are untouched; the USB stack is no_std/no-alloc.
[[bin]]
name = "usb_cdc_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

# S140-compatible profile (app @ 0x26000). Same source; the SoftDevice sits dormant,
# so the app owns USBD while the peripheral's ENABLE/READY handshake manages its clock.
[[bin]]
name = "usb_cdc_demo_s140"
path = "src/main.rs"
required-features = ["board-nicenano-s140"]

[dependencies]
nobro-adapter-mpu9250-imu = { path = "../../../adapters/imu/mpu9250-imu", default-features = false }
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
nobro-kernel = { path = "../../../crates/nobro_kernel" }
nobro-sal = { path = "../../../crates/nobro_sal" }
cortex-m = "0.7"
cortex-m-rt = "0.7"
panic-halt = "0.2"
defmt = "0.3"
defmt-rtt = "0.4"
nobro-usb = { path = "../../../crates/nobro_usb", default-features = false, features = ["backend-nrf-usbd"] }
nrf52840-pac = "0.12"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = [
    "nobro-hal/board-promicro-nosd",
    "nobro-adapter-mpu9250-imu/board-promicro-nosd",
]
board-nicenano-s140 = [
    "nobro-hal/board-nicenano-s140",
    "nobro-adapter-mpu9250-imu/board-nicenano-s140",
]
