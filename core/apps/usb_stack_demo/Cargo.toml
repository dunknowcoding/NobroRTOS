[package]
name = "usb-stack-demo"
version.workspace = true
edition.workspace = true

# Modular USB stack demo (M-USB): the app uses only nobro_usb::mount() + UsbStack, so a
# board swaps the whole USB backend by feature. Default mounts nrf-usbd; S140 layout for
# board5. Prove-out target for the mountable USB architecture.
[[bin]]
name = "usb_stack_demo"
path = "src/main.rs"

[dependencies]
nobro-usb = { path = "../../crates/nobro_usb" }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
panic-halt = "0.2"
defmt = "0.3"
defmt-rtt = "0.4"

[features]
default = ["backend-nrf-usbd"]
backend-nrf-usbd = ["nobro-usb/backend-nrf-usbd"]
backend-tinyusb = ["nobro-usb/backend-tinyusb"]
backend-taichiusb = ["nobro-usb/backend-taichiusb"]
backend-usb-serial-jtag = ["nobro-usb/backend-usb-serial-jtag"]
backend-ra-usbfs = ["nobro-usb/backend-ra-usbfs"]
