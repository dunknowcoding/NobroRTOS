[package]
name = "spi-imu-demo"
version.workspace = true
edition.workspace = true

# Reads a reference SPI IMU over the SPIM HAL driver and self-certifies via
# NOBRO_SPI_IMU_REPORT (J-Link mem32). This demo targets the no-SoftDevice profile.
[[bin]]
name = "spi_imu_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
nobro-eh-spi = { path = "../../../adapters/bus/embedded-hal-spi", default-features = false }
embedded-hal = "1.0"
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd", "nobro-eh-spi/board-promicro-nosd"]
