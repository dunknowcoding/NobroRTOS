[package]
name = "ros-imu-demo"
version.workspace = true
edition.workspace = true

# ROS bridge on hardware: reads the IMU, publishes a bounded ROS-style topic message
# through the RosImuBridge (RosBridgeSal), and pumps the queue to the transport,
# recording published / transmitted / dropped / peak-depth in NOBRO_ROS_EVAL_REPORT.
# Proves the bounded bridge contract runs on a real board with no queue overflow.
[[bin]]
name = "ros_imu_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-adapter-ros-imu-bridge = { path = "../../../adapters/protocol/ros-imu-bridge" }
nobro-adapter-mpu9250-imu = { path = "../../../adapters/imu/mpu9250-imu", default-features = false }
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
nobro-kernel = { path = "../../../crates/nobro_kernel" }
nobro-sal = { path = "../../../crates/nobro_sal" }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = [
    "nobro-hal/board-promicro-nosd",
    "nobro-adapter-mpu9250-imu/board-promicro-nosd",
]
board-nicenano-s140 = [
    "nobro-hal/board-nicenano-s140",
    "nobro-adapter-mpu9250-imu/board-nicenano-s140",
]
