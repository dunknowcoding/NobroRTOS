[package]
name = "mpu-guard-demo"
version.workspace = true
edition.workspace = true

# MPU memory-protection regions: an MPU region makes a RAM block read-only; a
# write to it raises MemManage, the handler records the fault and disables the region,
# and the retried write succeeds - hardware-enforced isolation with recovery.
# NOBRO_MPU_REPORT.
[[bin]]
name = "mpu_guard_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[[bin]]
name = "mpu_guard_demo_s140"
path = "src/main.rs"
required-features = ["board-nicenano-s140"]

[dependencies]
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
nobro-kernel = { path = "../../../crates/nobro_kernel" }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140"]
