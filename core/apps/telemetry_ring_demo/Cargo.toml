[package]
name = "telemetry-ring-demo"
version.workspace = true
edition.workspace = true

# Sensor data logging to on-chip flash (NVMC) on a development board: erase a page, log
# synthetic sensor samples, read back + verify integrity. Self-certifies via
# NOBRO_FLASH_LOG_REPORT (J-Link mem32).
[[bin]]
name = "telemetry_ring_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-hal = { path = "../../crates/nobro_hal", default-features = false }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140"]
