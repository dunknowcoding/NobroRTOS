[package]
name = "pwm-bank-demo"
version.workspace = true
edition.workspace = true

# Servo/ESC PWM bank under leases (M150): four 50 Hz channels on PWM0 behind the
# Resource::Pwm0 lease - conflict rejected, four distinct pulses set + read back from
# the live SEQ RAM, 50 Hz confirmed. NOBRO_PWM_BANK_REPORT (mem32).
[[bin]]
name = "pwm_bank_demo"
path = "src/main.rs"
required-features = ["board-promicro-nosd"]

[dependencies]
nobro-hal = { path = "../../crates/nobro_hal", default-features = false }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
defmt = "0.3"
defmt-rtt = "0.4"
panic-halt = "0.2"

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140"]
