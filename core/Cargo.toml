[workspace]
resolver = "2"
members = [
    "crates/nobro_sal",
    "crates/nobro_hal",
    "crates/nobro_kernel",
    "crates/nobro_host",
    "adapters/robo-servo",
    "adapters/sensor-stub",
    "adapters/mpu9250-imu",
    "adapters/embedded-hal-i2c",
    "apps/mvk_ppi_timestamp",
    "apps/resource_sched_demo",
    "apps/sal_adapter_demo",
    "apps/imu_i2c_demo",
    "apps/usb_cdc_demo",
    "apps/eh_imu_demo",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
authors = ["dunknowcoding (YouTube NiusRobotLab)"]

[profile.release]
debug = 2
lto = true
opt-level = "s"
codegen-units = 1

[profile.dev]
opt-level = 1
