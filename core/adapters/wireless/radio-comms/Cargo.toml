[package]
name = "nobro-adapter-radio-comms"
version.workspace = true
edition.workspace = true

# Framed radio comms as a managed `nobro-wireless` backend over the nRF RADIO HAL.
# Construction takes the exclusive radio lease; the domain wrapper adds bounded payload,
# deadline, and packet/byte-window accounting without another transport abstraction.

[dependencies]
nobro-hal = { path = "../../../crates/nobro_hal", default-features = false }
nobro-wireless = { path = "../../../crates/nobro_wireless" }

[features]
default = ["board-promicro-nosd"]
board-promicro-nosd = ["nobro-hal/board-promicro-nosd"]
board-nicenano-s140 = ["nobro-hal/board-nicenano-s140"]
