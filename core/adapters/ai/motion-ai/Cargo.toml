[package]
name = "nobro-adapter-motion-ai"
version.workspace = true
edition.workspace = true

# A bounded on-device inference adapter (AiInferenceSal): a tiny, deterministic motion
# classifier over IMU accel-magnitude samples (idle vs active by signal variance). No
# heap, no float, fixed arena - it is the "edge AI as a bounded RTOS contract" pillar
# demonstrated concretely. Portable: depends only on the SAL traits, not the HAL.

[dependencies]
nobro-sal = { path = "../../../crates/nobro_sal" }
