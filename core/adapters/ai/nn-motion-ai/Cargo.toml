[package]
name = "nobro-adapter-nn-motion-ai"
version.workspace = true
edition.workspace = true

# A bounded on-device *neural-network* inference adapter (AiInferenceSal): a 3->8->2
# int8 MLP motion classifier (idle/active) whose weights are TRAINED on the host
# (tools/train_motion_nn.py) and embedded as const arrays (src/nn_weights.rs). Integer-
# only, no heap, no float, fixed arena - a real "NN tools -> embedded" pipeline behind
# the same AI contract as the variance classifier. Depends only on the SAL traits.

[dependencies]
nobro-sal = { path = "../../../crates/nobro_sal" }
