[package]
name = "nobro-usb"
version.workspace = true
edition.workspace = true

# Modular, mountable USB device stack for NobroRTOS. A board mounts exactly ONE backend
# (selected by a `backend-*` feature) behind the common `UsbStack` trait, so the same app
# code runs over one implemented backend selected for the board.

[dependencies]
usb-device = "0.3"
usbd-serial = "0.2"
portable-atomic = "1"
nrf-usbd = { path = "../../vendor/nrf-usbd", optional = true }
cortex-m = { version = "0.7", optional = true }

[features]
# Default backend for the nRF52840 dev boards (matches ArduinoNRF Layer-0 native NrfUsbd).
default = ["backend-nrf-usbd"]
backend-nrf-usbd = ["dep:nrf-usbd", "dep:cortex-m"]
# ESP32-C3/S3 fixed-function USB-Serial-JTAG: a real register-level data path (the
# peripheral enumerates itself in silicon; poll/read/write hit EP1/EP1_CONF directly).
backend-usb-serial-jtag = []
# RA4M1 (Arduino UNO R4) USBFS: our own raw-register CDC-ACM device stack (pipe-based
# enumeration + bulk data), ported from the RA manual / cross-checked vs TinyUSB rusb2.
backend-ra-usbfs = []
