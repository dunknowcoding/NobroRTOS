[package]
name = "nobro-secure"
version.workspace = true
edition.workspace = true

# Security + data-integrity primitives built on nobro-crypto's SHA-256/HMAC/AES:
# device attestation, a bounded key store, OTA rollback protection,
# tamper detection, a hash-chained signed audit log, and a versioned config
# store with an integrity tag. no_std, no heap.
[dependencies]
nobro-crypto = { path = "../nobro_crypto", default-features = false }
ed25519-dalek = { version = "3.0.0", default-features = false, features = ["fast", "signature"] }

[features]
default = ["portable-atomic-cs"]
portable-atomic-cs = ["nobro-crypto/portable-atomic-cs"]
