[package]
name = "nobro-iot"
version.workspace = true
edition.workspace = true

# IoT capsule for NobroRTOS: one place for wireless-comm apps and APIs - BLE, WiFi,
# Zigbee, Thread, RFID, and proprietary radio - behind a common transport surface
# (mirroring nobro_usb's mountable-backend pattern). Ships protocol descriptors as data,
# an IotTransport trait radios implement, and pure-logic protocol helpers (the BLE
# advertising PDU builder proven on air by ble_adv_demo, ISO 14443A UID checks). No heap.

