[package]
name = "nobro-wireless"
version.workspace = true
edition.workspace = true

# Wireless domain for NobroRTOS: bounded link contracts, protocol descriptors, explicit
# WirelessBackend implementations, and pure-logic helpers (including BLE advertising
# PDU construction and ISO 14443A UID checks). MFRC522 and a raw IEEE 802.15.4 CC2530
# transport are implemented here; descriptors for higher protocol layers do not imply
# board or stack support. WiFi/BLE lifecycle traits and owned mounting are portable
# contracts in this crate; concrete backend features remain absent until independently
# implemented and gated. Additive WiFi/BLE instances may coexist only under an explicit
# shared-radio lease. The default has no heap; the optional `alloc` feature only
# enables an explicitly selected, pre-reserved bounded queue.

[dependencies]
nobro-net = { path = "../nobro_net" }

[features]
default = []
alloc = []
