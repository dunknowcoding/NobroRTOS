[package]
name = "nobro-kernel"
version.workspace = true
edition.workspace = true

[dependencies]
nobro-hal = { path = "../nobro_hal", default-features = false, features = ["contract-only"], optional = true }
# Drop-in atomics: native CAS where the ISA has it, critical-section fallback on cores
# that lack atomic CAS (Cortex-M0+, RISC-V without the 'a' extension) - keeps the kernel
# portable across MCU families.
portable-atomic = { version = "1", default-features = false }
critical-section = "1.2"

[features]
default = ["portable-atomic-cs"]
# critical-section-backed atomics for cores without CAS; targets whose runtime already
# provides atomics another way (esp-hal assume-single-core) disable default features.
portable-atomic-cs = ["portable-atomic/critical-section"]
hal-profile = ["dep:nobro-hal"]

[dev-dependencies]
critical-section = { version = "1.2", features = ["std"] }
