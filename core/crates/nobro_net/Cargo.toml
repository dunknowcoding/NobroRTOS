[package]
name = "nobro-net"
version.workspace = true
edition.workspace = true

# No-heap networking primitives for multi-board NobroRTOS meshes: distance-vector
# routing, round-trip time synchronization, and bounded data aggregation
#. Pure logic, fixed capacity, host-tested - portable across transports (radio,
# serial, sim).

[dependencies]
nobro-crypto = { path = "../nobro_crypto", default-features = false }
nobro-secure = { path = "../nobro_secure", default-features = false }

[dev-dependencies]
ed25519-dalek = { version = "3.0.0", default-features = false, features = ["fast", "signature"] }
