[package]
name = "nobro-conformance"
version.workspace = true
edition.workspace = true

# The cross-MCU conformance suite (M92): one set of portable-core subsystem tests that
# every port runs verbatim - nRF52840, ESP32-C3 (RISC-V), RP2350 (Cortex-M33), and the
# host. A port passes conformance when all subsystems report true.

[dependencies]
nobro-kernel = { path = "../nobro_kernel", default-features = false }
nobro-net = { path = "../nobro_net" }
nobro-ml = { path = "../nobro_ml" }
nobro-crypto = { path = "../nobro_crypto", default-features = false }
nobro-power = { path = "../nobro_power" }

[features]
default = ["portable-atomic-cs"]
portable-atomic-cs = ["nobro-kernel/portable-atomic-cs", "nobro-crypto/portable-atomic-cs"]
