[package]
name = "nobro-port-ra4m1"
version = "0.1.0"
edition = "2021"

# NobroRTOS portable core on the UNO R4 WiFi's RA4M1 (Cortex-M4) . No vendor HAL:
# our own HOCO clock bring-up, PFS pin muxing, bridge/header/WiFi SCI UARTs, native
# USBFS escape path, and PORT1 LED heartbeat. App links at 0x4000 behind the stock
# DFU bootloader.

[dependencies]
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = { version = "0.7", features = ["device"] }
critical-section = "1.2"
panic-halt = "0.2"
nobro-hal = { path = "../../crates/nobro_hal", default-features = false, features = ["contract-only"] }
# our own RA4M1 USBFS CDC backend, available as an explicit native USB path
nobro-usb = { path = "../../crates/nobro_usb", default-features = false, features = ["backend-ra-usbfs"] }

[dev-dependencies]
critical-section = { version = "1.2", features = ["std"] }

[features]
default = []
# Opt-in GPT -> ICU/ELC -> DMAC0 completion future.
event-dma = []
# Diagnostic image used by physical/CI qualification; ordinary applications
# pay only for the provider paths they call.
event-dma-selftest = ["event-dma"]

[profile.release]
debug = 2
lto = true
opt-level = "s"
codegen-units = 1
panic = "abort"

[workspace]
