[package]
name = "nobro-port-samd21"
version = "0.1.0"
edition = "2021"

# NobroRTOS portable core on the SAMD21 (Cortex-M0+) . All drivers are our own,
# written from the SAMD21 datasheet: clock bring-up (OSC8M at /1) and a SERCOM0 USART
# for the report line. This target does not claim portable peripheral-provider coverage.

[dependencies]
cortex-m = "0.7"
cortex-m-rt = "0.7"
critical-section = { version = "1.2", features = ["restore-state-bool"] }
panic-halt = "0.2"
portable-atomic = { version = "1.13", default-features = false, features = ["unsafe-assume-single-core"] }

[profile.release]
debug = 2
lto = true
opt-level = "s"
codegen-units = 1

[workspace]
