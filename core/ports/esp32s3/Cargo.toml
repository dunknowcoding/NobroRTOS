[package]
name = "nobro-port-esp32s3"
version = "0.1.0"
edition = "2021"

# NobroRTOS provider bring-up on the ESP32-S3 (Xtensa LX7), reporting typed provider
# status over the S3's USB-Serial-JTAG. Standalone
# workspace; requires the espup Xtensa Rust toolchain (`cargo +esp build`).

[dependencies]
esp-hal = { version = "=0.23.1", features = ["esp32s3"] }
esp-println = { version = "=0.13.0", default-features = false, features = ["esp32s3", "jtag-serial", "critical-section"] }
embedded-hal = "1.0"
nb = "1"
nobro-hal = { path = "../../crates/nobro_hal", default-features = false, features = ["contract-only"] }
nobro-kernel = { path = "../../crates/nobro_kernel", default-features = false }
nobro-nn = { path = "../../crates/nobro_nn" }

[profile.release]
debug = 2
lto = true
opt-level = "s"
codegen-units = 1

[workspace]
