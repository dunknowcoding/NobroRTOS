[package]
name = "embassy-complex"
version = "0.1.0"
edition = "2021"

[workspace]

[features]
runtime-trace = ["embassy-executor/trace"]
arena-1024 = ["embassy-executor/task-arena-size-1024"]
nightly-static = ["embassy-executor/nightly"]

[dependencies]
embassy-executor = { version = "0.7", features = ["arch-cortex-m", "executor-thread"] }
embassy-time = "0.4"
embassy-nrf = { version = "0.3", features = ["nrf52840", "time-driver-rtc1", "gpiote"] }
embassy-sync = "0.6"
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
panic-halt = "0.2"
static_cell = "2"

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
debug = false
