[package]
name = "nobro-graph-min"
version = "0.1.0"
edition = "2021"

# The graph-API implementation of the same workload: one declaration set,
# typed task builders with safe defaults, channel-derived capabilities.


[workspace]

[dependencies]
nobro-kernel = { path = "../../crates/nobro_kernel" }
nobro-power = { path = "../../crates/nobro_power" }
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
panic-halt = "0.2"

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
debug = false
