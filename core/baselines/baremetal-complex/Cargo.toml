[package]
name = "baremetal-complex"
version = "0.1.0"
edition = "2021"

# The COMPLEX workload (Wave 59), bare-metal floor: the same five-stage
# pipeline hand-rolled with no framework — deadline scheduling, fan-out, and
# backpressure all written by hand. The size floor the frameworks are measured
# against.

[workspace]

[dependencies]
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
panic-halt = "0.2"

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
debug = false
